<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="disk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4a5e"/>
      <stop offset="1" stop-color="#1e2733"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6b3d"/>
      <stop offset="1" stop-color="#d6291e"/>
    </linearGradient>
  </defs>

  <!-- drive body -->
  <rect x="18" y="30" width="92" height="68" rx="12" fill="url(#disk)"
        stroke="#0d141c" stroke-width="3"/>

  <!-- platter -->
  <circle cx="64" cy="64" r="26" fill="#0d141c"/>
  <circle cx="64" cy="64" r="26" fill="none" stroke="#5b7088" stroke-width="2"/>
  <circle cx="64" cy="64" r="6"  fill="#5b7088"/>

  <!-- activity LEDs -->
  <circle cx="30" cy="42" r="3" fill="#7fe07f"/>
  <circle cx="40" cy="42" r="3" fill="#4a5d72"/>

  <!-- wipe sweep -->
  <path d="M30 92 L74 38 a14 14 0 0 1 22 18 L58 104 Z" fill="url(#sweep)"
        stroke="#7a160f" stroke-width="2" opacity="0.95"/>
  <!-- eraser tip highlight -->
  <path d="M78 34 a14 14 0 0 1 22 18 L92 62 L70 44 Z" fill="#ffd2bf" opacity="0.9"/>

  <!-- erased streaks -->
  <line x1="34" y1="86" x2="50" y2="98" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="40" y1="80" x2="56" y2="92" stroke="#ffffff" stroke-width="2" opacity="0.35"/>
</svg>
